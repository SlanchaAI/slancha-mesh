model_id = "Qwen/Qwen3.6-27B"
specialist_id = "qwen3.6-27b-q4-ollama"
domain = "general"
difficulty_tiers = ["easy", "medium", "hard"]
languages = ["en", "es", "fr", "de", "zh", "ja"]
required_backend = "ollama"
ollama_tag = "qwen3.6:27b"
storage_gb = 17.0
# runtime/min_vram sized from MEASUREMENT, not weights: the same-geometry
# qwen3.5:27b (64L × 4 KV heads × head_dim 256, 256K window) measured 42GB
# resident on gb10 2026-07-14 — Ollama allocates KV for the full context
# window. Weights-only numbers here are the lie the allocator packs with.
