# Tier-1 specialist: general-purpose fallback, Ollama (GGUF Q4_K_M) edition.
#
# Repointed 2026-07 SOTA audit (#141): the previous `llama-3.1-8b-instruct-q5-ollama`
# card pointed at the frozen/EOL Llama open line. `mistralai/Ministral-3-8B-Instruct-2512`
# (Apache-2.0, native vision) is the verified replacement — same model as the
# vLLM sibling `ministral-3-8b-q4`, different engine. Quant note: the prior
# card chose Q5_K_M over Q4_K_M for the fallback tier specifically to protect
# quality (Q5 keeps near-FP16 parity where Q4 regresses more). Ollama's
# `ministral-3` library only ships Q4_K_M/Q8_0/FP16 tags today (no Q5_K_M),
# so this card is Q4_K_M until/unless a Q5 tag appears — flagged so nobody
# assumes the quality-tier reasoning still applies unchanged.
