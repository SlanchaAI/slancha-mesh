# DRAFT — validated + live-served 2026-07-14 on promaxgb10-d325 (GB10), routed
# through the mesh router and exercised by slancha-delegate's tool-calling loop.
#
# Tier-1 general specialist, Ollama (GGUF) edition — the TOOL-CALLING lane.
# Chosen over qwen2.5-coder-7b-q4-ollama for the slancha-delegate ReAct path:
# qwen2.5-coder's ollama template emits tool calls as JSON text (no structured
# `tool_calls` field), which breaks an OpenAI-shape agent loop. qwen3:8b's
# ollama template returns native structured tool_calls, so it drives the
# delegate's dispatch correctly. Same model family as the vLLM sibling
# `qwen3-8b-q4`, different engine.
model_id = "Qwen/Qwen3-8B"
specialist_id = "qwen3-8b-q4-ollama"
domain = "general"
difficulty_tiers = ["easy", "medium", "hard"]
languages = ["en"]
required_backend = "ollama"
ollama_tag = "qwen3:8b"
storage_gb = 4.9
runtime_gb = 6.9
min_vram_gb = 7.5
context_window = 40960
n_layers = 36
hidden_size = 4096
n_kv_heads = 8
head_dim = 128
kv_arch = "gqa"
supports_lora_finetune = false
upstream_model_card = "Qwen/Qwen3-8B"
coverage_tier = 1

# estimated_tps_at DERIVED (not measured) via the §3.2 roofline in
# docs/SIZING_BANDWIDTH_BRIEF.md: tps = MBU 0.8 × datasheet BW ÷ runtime_gb
# (batch-1, short-ctx upper bound). Datasheet BW (GB/s): gb10 273, m4_pro 273,
# m3_ultra 819, rtx_4090 1008, rtx_3090 936. Allocator uses these only for
# tie-breaking when no live bandwidth probe exists.
[estimated_tps_at]
gb10 = 31.7
m4_pro = 31.7
m3_ultra = 95.0
rtx_4090 = 116.9
rtx_3090 = 108.5
