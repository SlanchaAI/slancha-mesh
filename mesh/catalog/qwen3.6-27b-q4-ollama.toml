min_vram_gb = 43.0
context_window = 262144
n_layers = 64
hidden_size = 5120
n_kv_heads = 4
head_dim = 256
kv_arch = "gqa"
capabilities = ["streaming", "system_prompt", "tools", "vision"]
supports_lora_finetune = false
upstream_model_card = "Qwen/Qwen3.6-27B"
coverage_tier = 1

