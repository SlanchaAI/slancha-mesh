languages = ["en", "es", "fr", "de", "it", "pt", "zh", "ja", "ko"]
required_backend = "ollama"
ollama_tag = "gemma4:12b-it-q4_K_M"
storage_gb = 7.2
runtime_gb = 9.5
min_vram_gb = 10.0
context_window = 262144
n_layers = 48
hidden_size = 3840
