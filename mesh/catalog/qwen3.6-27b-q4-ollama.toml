# pass. Qwen3.6-27B (Apache-2.0, ungated, HF config verified live
# 2026-07-14; arch class is "qwen3_5" — Qwen3.6 checkpoints reuse the 3.5
# architecture). Supersedes qwen3.5-27b-q4-ollama same-day: the 3.5 card
# was authored hours before the deeper check surfaced the open 3.6 line.
# Multimodal (vision), thinking, native tools, 256K context. "Substantial
# upgrades, particularly in Agentic Coding" per the model page — but the
# code domain lane belongs to qwen3-coder-next-80b; this card is the
